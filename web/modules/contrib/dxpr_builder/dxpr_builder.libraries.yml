# DXPR Builder Libraries

core:
  version: VERSION
  css:
    theme:
      dxpr_builder/css/dxpr_builder.css: {}

editor.core:
  version: VERSION
  css:
    theme:
      css/drupal-integration.css: {}
      dxpr_builder/vendor/unmanaged/et-line-font/et-line-font.css: {}
      dxpr_builder/vendor/unmanaged/pe-icon-7-stroke/css/pe-icon-7-stroke.css: {}
      dxpr_builder/vendor/managed/dxb_slider/dxb-slider.min.css: {}
  js:
    js/global-setup.js: { weight: -10 }
    js/image-utils.js: { weight: -9 }
    js/image-metadata.js: { weight: -8 }
    js/entity-browser.js: { weight: -7 }
    js/file-upload.js: { weight: -3 }
    js/image-select.js: { weight: -2 }
    js/video-select.js: { weight: -1 }
    dxpr_builder/vendor/managed/base64-js/base64js.min.js: { minified: true }
    dxpr_builder/vendor/managed/bootstrap-notify/bootstrap-notify.min.js: { minified: true }
    dxpr_builder/vendor/managed/sortablejs/Sortable.min.js: { minified: true }
    dxpr_builder/vendor/managed/draggabilly/dist/draggabilly.pkgd.min.js: { minified: true }
    dxpr_builder/vendor/managed/@floating-ui/core/dist/floating-ui.core.umd.min.js: { minified: true }
    dxpr_builder/vendor/managed/@floating-ui/dom/dist/floating-ui.dom.umd.min.js: { minified: true }
    dxpr_builder/vendor/managed/dxb_slider/dxb-slider.min.js: { minified: true }
  dependencies:
    - core/jquery
    - core/drupalSettings
    - core/internal.jquery_ui
    - core/once
    - dxpr_builder/string_compression
    - dxpr_builder/elements.glyphicons_halflings
    - dxpr_builder/editor.core.styles

string_compression:
  version: VERSION
  js:
    dxpr_builder/vendor/managed/lz-string/libs/lz-string.min.js: { minified: true }

editor.dev:
  version: VERSION
  js:
    dxpr_builder/dxpr_builder_dev.js: { }
  dependencies:
    - core/drupal
    - core/once

editor.frontend:
  version: VERSION

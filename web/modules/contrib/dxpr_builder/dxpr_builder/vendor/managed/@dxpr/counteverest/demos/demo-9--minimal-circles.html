<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Don't forget to change the title! -->
    <title>Theme 9 - Count Everest jQuery Plugin</title>

    <!-- Load Google Fonts -->
    <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Open+Sans:300" />

    <!-- Load stylesheet -->
    <link rel="stylesheet" href="../dist/counteverest.min.css" />

    <!-- DEMO styles to center countdown vertically and horizontally -->
    <style type="text/css">
      html {
        display: table;
        height: 100%;
        width: 100%;
      }

      body {
        display: table-cell;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          sans-serif;
        margin: 0;
        padding: 0;
        vertical-align: middle;
      }

      .ce-countdown {
        margin: 0 auto;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Nothing to change here -->
    <div class="ce-countdown-wrap--theme-9">
      <div
        class="ce-countdown ce-countdown--theme-9"
        data-ce-units="days,hours,minutes,seconds"
      ></div>
    </div>

    <!-- Load all necessary JavaScript files -->
    <script src="../dist/counteverest.min.js"></script>

    <!-- Init Count Everest plugin -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const countdownElement = document.querySelector('.ce-countdown');
        if (countdownElement) {
          new CountEverest(countdownElement, {
            day: 1,
            month: 1,
            year: 2026,
          });
        }
      });
    </script>
  </body>
</html>

hudx_astro_forms___app_12.test_page:
  path: '/hudx-test/astro-forms---app-12'
  defaults:
    _controller: '\Drupal\hudx_astro_forms___app_12\Controller\HudxTestController::page'
    _title: 'HUDX Test: astro-forms---app-12'
  requirements:
    _permission: 'access content'

hudx_astro_forms___app_12.api_submissions_list:
  path: '/api/submissions'
  defaults:
    _controller: '\Drupal\hudx_astro_forms___app_12\Controller\SubmissionsController::list'
    _title: 'Submissions'
  methods: [GET]
  requirements:
    _permission: 'access content'

hudx_astro_forms___app_12.api_submissions_create:
  path: '/api/submissions'
  defaults:
    _controller: '\Drupal\hudx_astro_forms___app_12\Controller\SubmissionsController::submit'
    _title: 'Create Submission'
  methods: [POST]
  requirements:
    _permission: 'access content'

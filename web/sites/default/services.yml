parameters:
  cors.config:
    enabled: true
    # Allow dev servers to fetch from Drupal JSON:API and REST.
    # In production all apps are same-origin so CORS headers are not needed,
    # but they do not cause harm.
    allowedHeaders:
      - 'Content-Type'
      - 'X-CSRF-Token'
    allowedMethods:
      - GET
      - POST
      - PATCH
      - DELETE
    allowedOrigins:
      - 'http://localhost:4321'
      - 'http://localhost:5173'
    exposedHeaders: false
    maxAge: false
    supportsCredentials: true

type: theme
core_version_requirement: ^9.3 || ^10 || ^11
base theme: bootstrap5

name: 'DXPR Theme'
description: 'Low code framework theme by DXPR.'
package: DXPR

dependencies:
  - drupal:file
  - dxpr_theme_helper:dxpr_theme_helper (>=3.0.0)
  - media_library_form_element:media_library_form_element

regions:
  secondary_header: 'Secondary Header'
  navigation: 'Navigation'
  navigation_collapsible: 'Navigation (Collapsible)'
  highlighted: 'Hero Region'
  page_title: 'Page Title'
  help: 'Help'
  content_top: 'Content Top'
  content: 'Content'
  content_bottom: 'Content Bottom'
  sidebar_first: 'Primary'
  sidebar_second: 'Secondary'
  footer: 'Footer'
  page_top: 'Page top'
  page_bottom: 'Page bottom'

libraries:
  - 'dxpr_theme/global-styling'

stylesheets:
  all:
    - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css

libraries-override:
  classy/base:
    css:
      component:
        css/components/collapse-processed.css: false
  gin/gin_base:
    css:
      component:
        dist/css/theme/font.css: false

libraries-extend:
  gin/gin_toolbar:
    - dxpr_theme/gin_toolbar
  diff/diff.general:
    - dxpr_theme/drupal-diff

config:
  install:
    - dxpr_theme.settings

dxpr_builder_classes:
  dxpr-theme-form-inline: 'Inline Form'
  dxpr-theme-util-background-accent1: 'Background color: DXPR Theme accent1'

hudx_react___3pd_ai_helper.test_page:
  path: '/hudx-test/react---3pd-ai-helper'
  defaults:
    _controller: '\Drupal\hudx_react___3pd_ai_helper\Controller\HudxTestController::page'
    _title: 'HUDX Test: react---3pd-ai-helper'
  requirements:
    _permission: 'access content'

hudx_react___3pd_ai_helper.api_submissions_list:
  path: '/api/react---3pd-ai-helper/submissions'
  defaults:
    _controller: '\Drupal\hudx_react___3pd_ai_helper\Controller\SubmissionsController::list'
    _title: 'Submissions'
  requirements:
    _permission: 'access content'
  methods: [GET]

hudx_react___3pd_ai_helper.api_submissions_create:
  path: '/api/react---3pd-ai-helper/submissions'
  defaults:
    _controller: '\Drupal\hudx_react___3pd_ai_helper\Controller\SubmissionsController::submit'
    _title: 'Submit'
  requirements:
    _permission: 'access content'
  methods: [POST]

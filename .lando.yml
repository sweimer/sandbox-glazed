name: sandbox-glazed
recipe: drupal10

proxy:
  appserver:
    - sandbox-glazed.lndo.site

config:
  php: '8.3'
  via: apache
  webroot: web

services:
  appserver:
    type: php:8.3
    xdebug: false
    build_as_root:
      - bash -c "mkdir -p /etc/mysql/conf.d && printf '[client]\nskip-ssl\n' > /etc/mysql/conf.d/nossL.cnf"
      - bash -c "printf '\n# Blackhole external module HTTP calls (update, announcements_feed, gemini, dxpr, ai)\n# These hang Docker DNS during Drupal bootstrap. Blackholing makes them fail instantly.\n0.0.0.0 updates.drupal.org\n0.0.0.0 www.drupal.org\n0.0.0.0 ftp.drupal.org\n0.0.0.0 api.openai.com\n0.0.0.0 generativelanguage.googleapis.com\n0.0.0.0 dxpr.com\n0.0.0.0 www.dxpr.com\n0.0.0.0 api.dxpr.com\n' >> /etc/hosts"

  database:
    type: mariadb:10.6
    creds:
      user: drupal
      password: drupal
      database: drupal

tooling:
  composer:
    service: appserver
  drush:
    service: appserver
    cmd: vendor/bin/drush
    working_dir: /app
  crx:
    service: appserver
    description: "Full cache reset: wipe PHP file cache + all DB cache tables + hard-restart Apache + curl warmup"
    cmd:
      - bash -c "rm -rf /app/web/sites/default/files/php/ 2>/dev/null || true"
      - mysql -h database -u drupal -pdrupal --skip-ssl drupal -e "TRUNCATE TABLE cache_bootstrap; TRUNCATE TABLE cache_config; TRUNCATE TABLE cache_container; TRUNCATE TABLE cache_data; TRUNCATE TABLE cache_default; TRUNCATE TABLE cache_discovery; TRUNCATE TABLE cache_dynamic_page_cache; TRUNCATE TABLE cache_entity; TRUNCATE TABLE cache_menu; TRUNCATE TABLE cache_page; TRUNCATE TABLE cache_render; TRUNCATE TABLE cache_toolbar; TRUNCATE TABLE semaphore; TRUNCATE TABLE router;"
      - bash -c 'APID=$(cat /var/run/apache2/apache2.pid 2>/dev/null); [ -n "$APID" ] && kill -9 "$APID" 2>/dev/null; pkill apache2 2>/dev/null; sleep 2; apache2ctl start 2>/dev/null; echo "Apache restarted — warming Drupal cache (may take 30-90s)..."; n=0; while true; do n=$((n+1)); [ $n -gt 18 ] && echo "Warmup timed out — first browser load may be slow" && break; CODE=$(curl -sk --max-time 10 http://localhost/ -o /dev/null -w "%{http_code}"); case $CODE in 200|301|302|404) echo "Drupal up (HTTP $CODE) — rebuilding router..."; cd /app && timeout 30 vendor/bin/drush php:eval "Drupal::service('"'"'router.builder'"'"')->rebuild(); echo '"'"'Router rebuilt'"'"';" --root=/app/web --uri=http://sandbox-glazed.lndo.site 2>/dev/null || echo "Router rebuild timed out — run: lando drush php:eval \"Drupal::service('"'"'router.builder'"'"')->rebuild();\""; echo "Cache reset complete — site ready"; break;; esac; printf "."; sleep 5; done'
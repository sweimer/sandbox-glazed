name: sandbox-glazed
recipe: drupal10

proxy:
  appserver:
    - sandbox-glazed.lndo.site

config:
  php: '8.3'
  via: apache
  webroot: web

services:
  appserver:
    type: php:8.3
    xdebug: false

  database:
    type: mariadb:10.6
    creds:
      user: drupal
      password: drupal
      database: drupal

tooling:
  composer:
    service: appserver
  drush:
    service: appserver
    cmd: vendor/bin/drush
    working_dir: /app
  crx:
    service: appserver
    description: "Full cache reset: wipe PHP file cache + all DB cache tables + pre-warm container via drush"
    cmd:
      - bash -c "rm -rf /app/web/sites/default/files/php/ 2>/dev/null || true"
      - mysql -h database -u drupal -pdrupal drupal -e "TRUNCATE TABLE cache_bootstrap; TRUNCATE TABLE cache_config; TRUNCATE TABLE cache_container; TRUNCATE TABLE cache_data; TRUNCATE TABLE cache_default; TRUNCATE TABLE cache_discovery; TRUNCATE TABLE cache_dynamic_page_cache; TRUNCATE TABLE cache_entity; TRUNCATE TABLE cache_menu; TRUNCATE TABLE cache_page; TRUNCATE TABLE cache_render; TRUNCATE TABLE cache_toolbar; TRUNCATE TABLE semaphore;"
      - bash -c "apache2ctl stop 2>/dev/null; sleep 1; cd /app && bash vendor/bin/drush status --root=/app/web --uri=http://sandbox-glazed.lndo.site; apache2ctl start 2>/dev/null; echo 'Cache reset complete — site ready'"
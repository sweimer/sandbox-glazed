name: Deploy to Pantheon

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Configure SSH
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PANTHEON_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host codeserver.dev.*.drush.in" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  Port 2222" >> ~/.ssh/config

      - name: Push artifact to Pantheon
        run: |
          git config user.email "deploy@github-actions"
          git config user.name "GitHub Actions"
          git add -f vendor/
          git commit -m "Deploy: include vendor/ [skip ci]"
          git remote add pantheon ${{ secrets.PANTHEON_GIT_URL }}
          git push pantheon HEAD:master --force

      - name: Install Terminus
        run: |
          curl -fsSL https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar -o /usr/local/bin/terminus
          chmod +x /usr/local/bin/terminus

      - name: Authenticate Terminus
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: terminus auth:login --machine-token="$PANTHEON_MACHINE_TOKEN"

      - name: Wait for Pantheon sync and enable new modules
        run: |
          # Wait for Quicksilver post-deploy to finish (updb + router + cr runs automatically)
          sleep 30
          # Enable any custom modules present in code but not yet enabled in DB
          terminus remote:drush 3-pd-ide.dev -- pm:list --type=module --status=disabled --no-core --field=name 2>/dev/null \
            | grep '^hudx_' \
            | xargs -r terminus remote:drush 3-pd-ide.dev -- pm:enable -y --

name: Deploy to Pantheon

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Configure SSH
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PANTHEON_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host codeserver.dev.*.drush.in" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  Port 2222" >> ~/.ssh/config

      - name: Push artifact to Pantheon
        run: |
          git config user.email "deploy@github-actions"
          git config user.name "GitHub Actions"
          git add -f vendor/
          git commit -m "Deploy: include vendor/ [skip ci]"
          git remote add pantheon ${{ secrets.PANTHEON_GIT_URL }}
          git push pantheon HEAD:master --force
